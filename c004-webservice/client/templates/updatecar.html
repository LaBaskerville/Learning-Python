{% include 'header.html' %}
  <body>
  <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <h1>{{appType}} | Car Project</h1>
                <h3>Demo:
                        <a href="{{url_for('createcar')}}">Create</a>
                        /
                        <a href="{{url_for('readcar')}}">Read</a>
                        /
                        <a href="{{url_for('updatecar')}}">Update</a>
                        /
                        <a href="{{url_for('deletecar')}}">Delete</a>
                        /
                        <a href="{{url_for('searchcar')}}">Search</a>
                </h3> 
            </div>
        </div>
        <div class="row">
            <div class="col-md-6"> <h4>Update Car Data</h4>
                
                <form action="{{ url_for('updatecarsave') }}" method="POST">
                    
                    <div class="form-group mb-3">
                        <label for="id">ID Mobil yang ingin diubah:</label>
                        <input type="number" class="form-control" id="id" name="id" placeholder="Masukkan ID Mobil (Contoh: 1)" required>
                    </div>

                    <div class="form-group mb-3">
                        <label for="carName">Nama Mobil Baru:</label>
                        <input type="text" class="form-control" id="carName" name="carName" placeholder="Masukkan Nama Mobil Baru" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Update Data</button>
                    <a href="{{ url_for('readcar') }}" class="btn btn-secondary">Batal</a>
                    
                </form>
                </div>
        </div>
  </div>
  </body>
